<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KESSAL MEDIA | THE GRAND EMPIRE 2026</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;700;900&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff0055;
            --royal-gold: #ffcc00;
            --dark-void: #020205;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(0, 243, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body { 
            background: var(--dark-void); 
            color: #fff; 
            font-family: 'Cairo', sans-serif; 
            overflow-x: hidden;
            perspective: 1500px;
        }

        /* محرك الخلفية الديناميكي */
        #nebula-canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(2px); }

        /* شريط التحميل (Loader) */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center;
            transition: 1s ease;
        }
        .scanner { width: 300px; height: 2px; background: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); animation: scanLine 2s infinite; }
        @keyframes scanLine { 0% { transform: translateY(-50px); } 100% { transform: translateY(50px); } }

        .app-container { max-width: 1600px; margin: 0 auto; padding: 40px; position: relative; z-index: 10; }

        /* الهيدر الأسطوري */
        .header-box {
            display: flex; justify-content: space-between; align-items: center;
            padding: 40px; border: 1px solid var(--border); border-radius: 30px;
            background: var(--glass); backdrop-filter: blur(30px); margin-bottom: 60px;
            position: relative; overflow: hidden;
        }
        .header-box::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,243,255,0.05), transparent);
            animation: sweep 5s infinite;
        }
        @keyframes sweep { 100% { left: 150%; } }

        .brand-identity { display: flex; align-items: center; gap: 30px; }
        .logo-frame {
            width: 130px; height: 130px; border: 4px solid var(--neon-blue);
            border-radius: 25px; padding: 10px; background: #000;
            box-shadow: 0 0 40px rgba(0,243,255,0.4); transform: rotate(-3deg);
        }
        .logo-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; }

        .title-text h1 { font-family: 'Orbitron'; font-size: 3.5rem; letter-spacing: 5px; text-shadow: 0 0 20px var(--neon-blue); }
        .title-text p { font-size: 1rem; color: var(--royal-gold); font-weight: 900; letter-spacing: 12px; }

        /* الأقسام الجمالية */
        .main-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 40px; }
        @media (max-width: 1200px) { .main-grid { grid-template-columns: 1fr; } }

        .glass-card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 40px; padding: 60px; position: relative;
            transition: 0.5s; backdrop-filter: blur(15px);
        }
        .glass-card:hover { border-color: var(--neon-blue); box-shadow: 0 20px 80px rgba(0, 243, 255, 0.1); }

        .section-title { font-family: 'Reem Kufi'; font-size: 3rem; color: var(--royal-gold); margin-bottom: 30px; position: relative; display: inline-block; }
        .section-title::after { content: ''; position: absolute; bottom: -10px; right: 0; width: 60%; height: 5px; background: var(--royal-gold); }

        .text-body { font-size: 1.7rem; line-height: 2.3; text-align: justify; color: #d1d5db; font-weight: 300; }

        /* نظام إرسال البيانات المتقدم */
        .form-engine { background: rgba(0,0,0,0.7); border: 2px solid var(--neon-pink); padding: 50px; border-radius: 40px; margin-top: 40px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        @media (max-width: 768px) { .input-row { grid-template-columns: 1fr; } }

        .cyber-field {
            background: #000; border: 1px solid #333; padding: 22px;
            border-radius: 15px; color: #fff; font-size: 1.2rem; font-family: 'Cairo';
            transition: 0.4s; width: 100%;
        }
        .cyber-field:focus { border-color: var(--neon-pink); outline: none; box-shadow: 0 0 25px rgba(255,0,85,0.3); }

        .btn-action {
            width: 100%; padding: 25px; background: linear-gradient(45deg, var(--neon-pink), #9000ff);
            border: none; border-radius: 20px; color: #fff; font-size: 1.8rem; font-weight: 900;
            font-family: 'Orbitron'; cursor: pointer; transition: 0.5s; position: relative; overflow: hidden;
            box-shadow: 0 10px 40px rgba(255,0,85,0.4);
        }
        .btn-action:hover { letter-spacing: 5px; transform: translateY(-5px); }
        .btn-action i { margin-right: 15px; }

        /* منطقة النجاح وزر البطاقة */
        #success-interface { display: none; margin-top: 30px; text-align: center; animation: fadeInUp 0.8s; }
        .btn-vip {
            padding: 20px 60px; background: transparent; border: 2px solid var(--neon-blue);
            color: var(--neon-blue); border-radius: 50px; font-weight: 900; cursor: pointer;
            font-size: 1.4rem; transition: 0.4s;
        }
        .btn-vip:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 50px var(--neon-blue); }

        /* البطاقة الملكية (Holographic Masterpiece) */
        #id-vault { display: none; margin-top: 80px; }
        .card-frame {
            width: 480px; height: 680px; margin: 0 auto; background: #000;
            border: 12px double var(--royal-gold); border-radius: 60px; position: relative;
            padding: 50px; overflow: hidden; box-shadow: 0 0 100px rgba(255, 204, 0, 0.2);
            transform-style: preserve-3d; transition: transform 0.1s;
        }
        .card-texture { position: absolute; top:0; left:0; width:100%; height:100%; opacity: 0.05; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        
        .card-content { border: 1px solid rgba(255, 204, 0, 0.2); height: 100%; border-radius: 35px; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 5; }
        .card-header-text { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--royal-gold); margin-top: 30px; letter-spacing: 5px; }
        
        .avatar-zone { 
            width: 180px; height: 180px; border: 4px solid var(--neon-blue); border-radius: 50%;
            margin: 40px auto; display: flex; align-items: center; justify-content: center;
            background: rgba(0, 243, 255, 0.05); box-shadow: 0 0 30px var(--neon-blue);
        }
