


<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSEL MEDIA | المنصة الرسمية</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-green: #00ff8c;
            --dark-bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { 
            margin: 0; background: var(--dark-bg); color: #fff;
            font-family: 'Cairo', sans-serif;
            background-image: radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
        }

        /* Navbar */
        .header {
            background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(15px);
            padding: 15px 5%; position: fixed; width: 100%; z-index: 2000;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .brand img { height: 45px; mix-blend-mode: screen; filter: drop-shadow(0 0 10px var(--neon-cyan)); }

        .container { max-width: 1200px; margin: 0 auto; padding: 120px 20px 60px; }

        /* Hero - الجبل */
        .hero-box {
            position: relative; height: 400px; border-radius: 30px; overflow: hidden;
            background: url('ksel-mountain.jpg') center/cover; /* الصورة المحلية */
            display: flex; align-items: center; justify-content: center; margin-bottom: 50px;
        }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--dark-bg), transparent); }
        .hero-box h1 { position: relative; font-size: 4rem; font-weight: 900; text-shadow: 0 0 20px var(--neon-cyan); }

        /* Panels */
        .glass-panel {
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 40px; margin-bottom: 40px; backdrop-filter: blur(10px);
        }

        /* Form & Card Grid */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }

        .input-field { margin-bottom: 20px; }
        input, select {
            width: 100%; padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1); color: #fff; font-family: 'Cairo';
        }

        .btn-action {
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-green));
            color: #000; border: none; padding: 18px; border-radius: 12px;
            font-weight: 900; width: 100%; cursor: pointer; transition: 0.3s;
        }
        .btn-action:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--neon-green); }

        /* البطاقة الطويلة */
        #kselCard {
            width: 320px; min-height: 500px; background: #050d1f;
            border: 2px solid var(--neon-green); border-radius: 20px;
            padding: 30px; display: none; margin: 0 auto; position: relative;
        }
